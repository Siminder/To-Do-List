<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do-list</title>
    <link rel="stylesheet" href="../styles/to-do-List.css">
    <script src="../script/to-do-list.js" defer></script>
    
</head>
<body>
    
    <!--Date box day name/day number/month -->
    <div class="dateBox">
            <h3>Thrusday</h3>
            <p>13</p>
            <p>Febrauary</p>
    </div>
    <!--Progression bar  -->
    <div  class="bar">
        <h3 >progresion bar</h3>
        <div class="progressBar">
            <div class="progress"></div>
        </div>
    </div>
    <!--Input box -->
    <input type="text" class="inputBox" id="input">
   
    <!--to do list -->
    <div class="listBox">
        <ul id="list">
        </ul>
    </div>

</body>
</html>
