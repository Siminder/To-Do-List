<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do-list</title>
    <link rel="stylesheet" href="../styles/to-do-List.css">
    <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet'>
    <script src="../script/to-do-list.js" defer></script>
    
</head>
<body>

   <div class='mainBox'>
        <!--Date box day name/day number/month -->
        <div class="leftSide">
            <div id='dateBox' class="dateBox">
            </div>
        </div>

        <div class="rightSide">
            <!--Progression bar  -->
            <div  class="bar">
                <h3 >progresion bar</h3>
                <div class="progressBar">
                    <div class="progress"></div>
                </div>
            </div>
            <!--Input box -->
            <input type="text" class="inputBox" id="input">
            </div>
    </div> 
   
    <!--to do list -->
    <div class="listBox">
        <ul id="list">
        </ul>
    </div>

</body>
</html>
